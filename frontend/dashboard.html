<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>SkillVault</title>

<link rel="stylesheet" href="dashboard.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="layout">

<!-- SIDEBAR -->
<aside class="sidebar">

<h2>SkillVault</h2>

<nav>

<a class="active">Dashboard</a>
<a href="certificates.html">My Certificates</a>
<a onclick="openPortfolio()">Share Portfolio</a>
<a href="settings.html">Settings</a>

</nav>

<div class="bottom">
<a onclick="logout()">Sign Out</a>
</div>

</aside>



<!-- MAIN -->
<main>

<header class="topbar">

<div class="left">

<h3>Dashboard</h3>

<input id="dashboardSearch" placeholder="Search certificates...">

</div>


<div class="right">

<button class="upload-btn" onclick="openUploadModal()">
+ Upload Certificate
</button>


<div class="profile">

<img id="avatarImg" class="avatar-img">

<div id="avatarFallback" class="avatar-fallback"></div>

<div class="profile-text">

<div id="userName"></div>

<div id="userEmail" class="email"></div>

</div>

<img
src="https://cdn-icons-png.flaticon.com/512/3524/3524659.png"
class="gear"
onclick="toggleSettings()"
>

<div id="settingsBox" class="settings">

<div onclick="openProfile()">✏ Edit Profile</div>

<div onclick="changePassword()">🔐 Change Password</div>

<div onclick="toggleTheme()">🌙 Theme</div>

</div>

</div>

</div>

</header>



<!-- STATS -->

<div class="stats">

<div class="stat">
<h1 id="totalCerts">0</h1>
<p>Total Certificates</p>
</div>

<div class="stat">
<h1 id="verified">0</h1>
<p>Verified</p>
</div>

<div class="stat">
<h1 id="skills">0</h1>
<p>Skills Learned</p>
</div>

<div class="stat">
<h1 id="learningStatus" class="status-inactive">
Inactive
</h1>
<p>Learning Status</p>
</div>

</div>



<!-- CONTENT -->

<div class="content">

<div class="card">

<h3>Recent Certificates</h3>

<div id="certList" class="recent-list"></div>

</div>


<div class="card">

<h3>Profile Strength</h3>

<div class="pie-container">

<canvas id="strengthPie"></canvas>

<div class="pie-center">
<span id="strengthPercent">0%</span>
</div>

</div>

<!-- ADD THIS LEGEND -->
<div class="legend">

<div class="legend-item">
<div class="legend-color beginner"></div>
<span>Beginner</span>
</div>

<div class="legend-item">
<div class="legend-color intermediate"></div>
<span>Intermediate</span>
</div>

<div class="legend-item">
<div class="legend-color advanced"></div>
<span>Advanced</span>
</div>

</div>

</div>

</div>

</main>

</div>

<div id="uploadFrameModal" class="modal">

  <div class="modal-box upload-frame-box">

    <iframe src="upload.html" id="uploadFrame"></iframe>

  </div>

</div>



<!-- EDIT PROFILE -->

<div class="modal" id="editModal">

<div class="modal-box">

<span class="close-btn" onclick="closeProfile()">✕</span>

<h2>Edit Profile</h2>

<input type="text" id="editName" class="input-field">

<button onclick="saveProfile()" class="save-btn">Save</button>

</div>

</div>



<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="firebase.js"></script>

<script src="theme.js"></script>

<script src="dashboard.js"></script>

</body>
</html>
